<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Chris Riordan">
    <meta name="description" content="WDD 131 – Dynamic Web Fundamentals | Chris Riordan | Week05 Form assignment">
    <link rel="stylesheet" href="styles/form.css">
    <title> WDD 131 – Dynamic Web Fundamentals – Chris Riordan Form Assignment</title>
    <script src="scripts/getdates.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Funnel+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="review-form" id="form1">
            <div class="form-group">
                <label for="productName">Product Name<select id="productName" name="product" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select></label>

                <fieldset class="form-group rating-group">
                    <legend>Overall Rating</legend>
                    <div class="stars">
                        <input type="radio" id="fivestar" name="stars" value="5" required><label for="fivestar"></label>
                        <input type="radio" id="fourstar" name="stars" value="4" required><label for="fourstar"></label>
                        <input type="radio" id="threestar" name="stars" value="3" required><label
                            for="threestar"></label>
                        <input type="radio" id="twostar" name="stars" value="2" required><label for="twostar"></label>
                        <input type="radio" id="onestar" name="stars" value="1" required><label for="onestar"></label>
                    </div>
                </fieldset>

                <div class="form-group">
                    <label for="installDate">Date of Installation<input type="date" id="installDate" name="installDate"
                            required></label>
                </div>

                <fieldset class="form-group">
                    <legend>Which features did you find useful in the product?<br>
                        <span class="italic">(check all that apply)</span>
                    </legend>
                    <label for="feature1" class="checkbox-label"><input type="checkbox" id="feature1" name="durability"
                            value="check">Durability</label>

                    <label for="feature2" class="checkbox-label"><input type="checkbox" id="feature2" name="ease"
                            value="check">Ease of
                        Use</label>

                    <label for="feature3" class="checkbox-label"><input type="checkbox" id="feature3" name="performance"
                            value="check">Performance</label>

                    <label for="feature4" class="checkbox-label"><input type="checkbox" id="feature4" name="design"
                            value="check">Design</label>
            </div>
            </fieldset>
            <div class="form-group">

                <label for="tArea">Written Review <span>(Optional)</span></label>
                <textarea id="tArea" name="review" rows="5"></textarea>
            </div>

            <div class="form-group">
                <label for="userName">Your Name <span>(Optional)</span><input type="text" id="userName"
                        name="enterName"></label>
            </div>
            <div class="form-group">
                <input type="submit" value="Post Review" class="submit-button">
            </div>
        </form>
    </main>
    <footer>
        <p><span id="currentyear"></span> Chris Riordan | Mississippi, USA</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
